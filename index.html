<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: Arial, "Noto Sans TC", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
      background: #f5f5f5;
      padding: 12px;
      margin: 0;
      color: #222;
      font-size: 18px;
    }

    .app {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      padding: 22px 20px 14px;
      background: #fff8e6;
      border-bottom: 1px solid #f1e3b8;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .description {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
    }

    .progress {
      display: flex;
      gap: 8px;
      padding: 16px 20px 0;
      background: white;
    }

    .progress-item {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #e5e5e5;
    }

    .progress-item.active {
      background: #f2a900;
    }

    .step-label {
      padding: 10px 20px 0;
      color: #555;
      font-size: 15px;
    }

    .content {
      padding: 20px;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .question-title {
      font-size: 22px;
      font-weight: bold;
      margin: 0 0 18px;
      line-height: 1.4;
    }

    label {
      display: block;
      margin-top: 22px;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    input,
    textarea,
    select,
    button {
      font-size: 20px;
      font-family: Arial, "Noto Sans TC", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    input,
    textarea {
      width: 100%;
      padding: 16px 15px;
      min-height: 64px;
      border: 1px solid #ccc;
      border-radius: 14px;
      background: #fff;
    }

    input[type="date"],
    input[type="time"] {
      text-align: left;
      direction: ltr;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #f2a900;
      box-shadow: 0 0 0 3px rgba(242,169,0,0.18);
    }

    input[type="checkbox"],
    input[type="radio"] {
      width: 24px;
      height: 24px;
      min-height: auto;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      accent-color: #f2a900;
      flex: 0 0 24px;
    }

    .field-note {
      color: #777;
      font-size: 14px;
      margin-top: 12px;
      line-height: 1.6;
      background: #fff8e6;
      border-left: 5px solid #f2a900;
      border-radius: 8px;
      padding: 12px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .option-card {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
      padding: 14px 16px;
      border: 1px solid #e4e4e4;
      border-radius: 14px;
      background: #fafafa;
      font-weight: normal;
      cursor: pointer;
    }

    .option-card span {
      font-size: 18px;
      line-height: 1.5;
    }

    .other-wrapper {
      display: none;
      margin-top: -2px;
      margin-left: 0;
    }

    .other-wrapper.show {
      display: block;
    }

    .other-input {
      min-height: 58px;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      position: sticky;
      bottom: 0;
      background: white;
      padding-top: 12px;
      padding-bottom: 4px;
      z-index: 5;
    }

    button,
    .download-link {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 19px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .primary-button {
      background: #f2a900;
      color: white;
    }

    .primary-button:hover {
      background: #d99600;
    }

    .secondary-button {
      background: #eeeeee;
      color: #333;
    }

    .secondary-button:hover {
      background: #dddddd;
    }

    .dark-button {
      background: #333;
      color: white;
    }

    .dark-button:hover {
      background: #111;
    }

    .reset-button {
      background: #777;
      color: white;
    }

    .reset-button:hover {
      background: #555;
    }

    button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    .upload-card {
      margin-top: 18px;
      padding: 18px;
      border: 2px dashed #d6d6d6;
      border-radius: 16px;
      background: #fafafa;
    }

    .upload-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .upload-card input[type="file"] {
      border: none;
      background: transparent;
      padding-left: 0;
      padding-right: 0;
      min-height: auto;
    }

    .thumb {
      display: none;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin-top: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: white;
    }

    #status {
      margin-top: 18px;
      padding: 14px;
      display: none;
      background: #fff8e6;
      border-left: 5px solid #f2a900;
      border-radius: 8px;
      color: #333;
      line-height: 1.6;
      font-size: 16px;
    }

    #resultArea {
      display: none;
      margin-top: 20px;
    }

    #finalImage {
      width: 100%;
      max-width: 1280px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: white;
      display: block;
    }

    .image-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .download-link {
      display: none;
      background: #eeeeee;
      color: #333;
    }

    .download-link:hover {
      background: #dddddd;
    }

    .export-source-area {
      position: fixed;
      left: -99999px;
      top: 0;
      width: 1280px;
      min-height: 720px;
      overflow: visible;
      background: white;
    }

    .export-card {
      width: 1280px;
      min-height: 720px;
      background: white;
      display: flex;
      align-items: flex-start;
      padding: 50px;
      gap: 40px;
    }

    .export-left {
      width: 48%;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .export-right {
      width: 52%;
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding-top: 91px;
    }

    .export-title {
      font-size: 50px;
      line-height: 1.3;
      font-weight: bold;
      color: #2f6b3f;
      margin-bottom: 4px;
    }

    .export-info {
      font-size: 30px;
      line-height: 1.55;
      white-space: pre-line;
      word-break: break-word;
      background: #fff8e6;
      border-left: 8px solid #f2a900;
      border-radius: 12px;
      padding: 22px;
    }

    .export-record {
      font-size: 30px;
      line-height: 1.55;
      background: #f8f8f8;
      border-radius: 12px;
      padding: 22px;
    }

    .export-food-img,
    .export-chart-img {
      width: 100%;
      height: auto;
      max-height: none;
      object-fit: contain;
      border-radius: 14px;
      background: #f5f5f5;
      border: 1px solid #eeeeee;
      display: block;
    }

    .summary-box {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 16px;
      margin-top: 16px;
      line-height: 1.7;
      font-size: 16px;
    }

    .summary-box strong {
      color: #333;
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      .app {
        border-radius: 14px;
      }

      .header {
        padding: 20px 16px 12px;
      }

      .content {
        padding: 18px 16px;
      }

      h2 {
        font-size: 24px;
      }

      .question-title {
        font-size: 21px;
      }

      input,
      textarea {
        font-size: 20px;
        min-height: 66px;
      }

      button,
      .download-link {
        font-size: 19px;
        min-height: 58px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h2>血糖紀錄圖片產生器</h2>
      <div class="description">
        分步驟填寫資料，上傳照片後直接產生紀錄圖片。
      </div>
    </div>

    <div class="progress">
      <div class="progress-item active" id="progress1"></div>
      <div class="progress-item" id="progress2"></div>
      <div class="progress-item" id="progress3"></div>
      <div class="progress-item" id="progress4"></div>
    </div>

    <div class="step-label" id="stepLabel">第 1 步 / 共 4 步：基本資料</div>

    <div class="content">
      <div class="step active" id="step1">
        <div class="question-title">先記錄這次吃了什麼</div>

        <label>日期</label>
        <input id="date" type="date">

        <label>食物</label>
        <input id="food" placeholder="例如：御飯團 2 顆">

        <label>進食時間</label>
        <input id="mealTime" type="time">

        <label>🥗 進食順序（單選）</label>
        <div class="option-group">
          <label class="option-card"><input type="radio" name="mealOrder" value="沒特別注意" onchange="toggleMealOrderOther()"><span>沒特別注意</span></label>
          <label class="option-card"><input type="radio" name="mealOrder" value="菜 → 蛋白質 → 澱粉（建議順序）" onchange="toggleMealOrderOther()"><span>菜 → 蛋白質 → 澱粉（建議順序）</span></label>
          <label class="option-card"><input type="radio" id="mealOrderOtherRadio" name="mealOrder" value="其他" onchange="toggleMealOrderOther()"><span>其他</span></label>
          <div id="mealOrderOtherWrapper" class="other-wrapper">
            <input id="mealOrderOtherText" class="other-input" placeholder="請輸入其他進食順序" oninput="syncMealOrderOther()">
          </div>
        </div>

        <label>💊 本餐搭配（可複選）</label>
        <div class="option-group">
          <label class="option-card"><input type="checkbox" id="mealPairingNone" name="mealPairingOption" value="無" onchange="toggleMealPairingNone()"><span>無</span></label>
          <label class="option-card"><input type="checkbox" name="mealPairingOption" value="蘅怡飲1條" onchange="handleMealPairingOptionChange()"><span>蘅怡飲1條</span></label>
          <label class="option-card"><input type="checkbox" name="mealPairingOption" value="纖維嚼片2片" onchange="handleMealPairingOptionChange()"><span>纖維嚼片2片</span></label>
          <label class="option-card"><input type="checkbox" name="mealPairingOption" value="纖巧錠3顆" onchange="handleMealPairingOptionChange()"><span>纖巧錠3顆</span></label>
          <label class="option-card"><input type="checkbox" id="mealPairingOtherCheck" onchange="toggleMealPairingOther()"><span>其他</span></label>
          <div id="mealPairingOtherWrapper" class="other-wrapper">
            <input id="mealPairingOtherText" class="other-input" placeholder="請輸入其他本餐搭配" oninput="syncOtherCheckbox('mealPairingOtherCheck', 'mealPairingOtherText', 'mealPairingOtherWrapper')">
          </div>
        </div>

        <label>😊 餐後感受（可複選）</label>
        <div class="option-group">
          <label class="option-card"><input type="checkbox" name="feelingOption" value="😊 精神好"><span>😊 精神好</span></label>
          <label class="option-card"><input type="checkbox" name="feelingOption" value="😴 想睡"><span>😴 想睡</span></label>
          <label class="option-card"><input type="checkbox" name="feelingOption" value="😋 容易餓"><span>😋 容易餓</span></label>
          <label class="option-card"><input type="checkbox" name="feelingOption" value="😵 不舒服（如頭暈、心悸等）"><span>😵 不舒服（如頭暈、心悸等）</span></label>
          <label class="option-card"><input type="checkbox" name="feelingOption" value="🙂 沒特別感覺"><span>🙂 沒特別感覺</span></label>
          <div>
            <label>其他</label>
            <input id="feelingOtherText" class="other-input" placeholder="請輸入其他餐後感受">
          </div>
        </div>

        <div class="nav-buttons">
          <button class="primary-button" onclick="nextStep()">下一步</button>
        </div>
      </div>

      <div class="step" id="step2">
        <div class="question-title">輸入血糖數據</div>

        <label>進食當下血糖</label>
        <input id="mealSugar" type="number" inputmode="numeric" placeholder="例如：110">

        <label>最高峰時間</label>
        <input id="peakTime" type="time">

        <label>最高峰血糖</label>
        <input id="peakSugar" type="number" inputmode="numeric" placeholder="例如：204">

        <label>飯後 3 小時血糖</label>
        <input id="afterSugar" type="number" inputmode="numeric" placeholder="例如：114">

        <div class="nav-buttons">
          <button class="secondary-button" onclick="prevStep()">上一步</button>
          <button class="primary-button" onclick="nextStep()">下一步</button>
        </div>
      </div>

      <div class="step" id="step3">
        <div class="question-title">上傳兩張圖片</div>

        <div class="upload-card">
          <div class="upload-title">上傳食物照片</div>
          <input
            type="file"
            id="foodImage"
            accept=".jpg,.jpeg,.png,.webp"
            onchange="previewImage('foodImage', 'foodThumb')"
          >
          <img id="foodThumb" class="thumb">
        </div>

        <div class="upload-card">
          <div class="upload-title">上傳血糖波動圖片</div>
          <input
            type="file"
            id="chartImage"
            accept=".jpg,.jpeg,.png,.webp"
            onchange="previewImage('chartImage', 'chartThumb')"
          >
          <img id="chartThumb" class="thumb">
        </div>

        <div class="field-note">
          建議先使用手機相機拍好照片，再從相簿選取上傳。請不要直接選「拍照」，避免相機黑畫面。
        </div>

        <div class="nav-buttons">
          <button class="secondary-button" onclick="prevStep()">上一步</button>
          <button class="primary-button" onclick="nextStep()">下一步</button>
        </div>
      </div>

      <div class="step" id="step4">
        <div class="question-title">確認後產生圖片</div>

        <div class="summary-box" id="summaryBox"></div>

        <button id="generateButton" class="primary-button" onclick="generateAndExportImage()">送出並產生圖片</button>

        <div id="status"></div>

        <div id="resultArea">
          <img id="finalImage" src="">

          <div class="image-actions">
            <button class="dark-button" onclick="shareImage()">分享 / 儲存圖片</button>
            <a id="downloadLink" class="download-link" href="#" download="血糖紀錄.png">備用下載圖片</a>
            <button class="reset-button" onclick="resetAll()">重新填寫</button>
          </div>
        </div>

        <div class="nav-buttons">
          <button class="secondary-button" onclick="prevStep()">上一步修改</button>
        </div>
      </div>

      <div id="exportSourceArea" class="export-source-area"></div>
    </div>
  </div>

  <script>
    let currentStep = 1;
    let latestImageBlob = null;
    let latestFileName = '血糖紀錄.png';

    const stepLabels = {
      1: '第 1 步 / 共 4 步：基本資料',
      2: '第 2 步 / 共 4 步：血糖數據',
      3: '第 3 步 / 共 4 步：圖片上傳',
      4: '第 4 步 / 共 4 步：產生圖片'
    };

    function blurActiveElement() {
      if (document.activeElement) {
        document.activeElement.blur();
      }
    }

    function clearGeneratedResult() {
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('finalImage').src = '';
      document.getElementById('downloadLink').href = '#';
      document.getElementById('downloadLink').style.display = 'none';
      document.getElementById('exportSourceArea').innerHTML = '';

      latestImageBlob = null;
      latestFileName = '血糖紀錄.png';

      setStatus('', false);
    }

    function toggleOtherInput(checkboxId, wrapperId) {
      const checkbox = document.getElementById(checkboxId);
      const wrapper = document.getElementById(wrapperId);
      const input = wrapper.querySelector('input');

      if (checkbox.checked) {
        wrapper.classList.add('show');
      } else {
        wrapper.classList.remove('show');
        if (input) {
          input.value = '';
        }
      }
    }

    function syncOtherCheckbox(checkboxId, inputId, wrapperId) {
      const checkbox = document.getElementById(checkboxId);
      const input = document.getElementById(inputId);
      const wrapper = document.getElementById(wrapperId);

      if (checkboxId === 'mealPairingOtherCheck') {
        handleMealPairingOptionChange();
      }

      if (input.value.trim() !== '') {
        checkbox.checked = true;
        wrapper.classList.add('show');
      }
    }

    function toggleMealPairingNone() {
      const noneCheck = document.getElementById('mealPairingNone');
      const normalOptions = document.querySelectorAll('input[name="mealPairingOption"]:not(#mealPairingNone)');
      const otherCheck = document.getElementById('mealPairingOtherCheck');
      const otherWrapper = document.getElementById('mealPairingOtherWrapper');
      const otherText = document.getElementById('mealPairingOtherText');

      if (noneCheck.checked) {
        normalOptions.forEach(option => {
          option.checked = false;
          option.disabled = true;
        });
        otherCheck.checked = false;
        otherCheck.disabled = true;
        otherText.value = '';
        otherWrapper.classList.remove('show');
      } else {
        normalOptions.forEach(option => {
          option.disabled = false;
        });
        otherCheck.disabled = false;
      }
    }

    function handleMealPairingOptionChange() {
      const noneCheck = document.getElementById('mealPairingNone');
      if (noneCheck.checked) {
        noneCheck.checked = false;
      }
      toggleMealPairingNone();
    }

    function toggleMealPairingOther() {
      handleMealPairingOptionChange();
      toggleOtherInput('mealPairingOtherCheck', 'mealPairingOtherWrapper');
    }

    function toggleMealOrderOther() {
      const otherRadio = document.getElementById('mealOrderOtherRadio');
      const wrapper = document.getElementById('mealOrderOtherWrapper');
      const input = document.getElementById('mealOrderOtherText');

      if (otherRadio.checked) {
        wrapper.classList.add('show');
      } else {
        wrapper.classList.remove('show');
        input.value = '';
      }
    }

    function syncMealOrderOther() {
      const input = document.getElementById('mealOrderOtherText');
      const otherRadio = document.getElementById('mealOrderOtherRadio');
      const wrapper = document.getElementById('mealOrderOtherWrapper');

      if (input.value.trim() !== '') {
        otherRadio.checked = true;
        wrapper.classList.add('show');
      }
    }

    function showStep(step) {
      blurActiveElement();
      currentStep = step;

      document.querySelectorAll('.step').forEach(el => {
        el.classList.remove('active');
      });

      document.getElementById(`step${step}`).classList.add('active');
      document.getElementById('stepLabel').innerText = stepLabels[step];

      for (let i = 1; i <= 4; i++) {
        const progress = document.getElementById(`progress${i}`);
        if (i <= step) {
          progress.classList.add('active');
        } else {
          progress.classList.remove('active');
        }
      }

      if (step === 4) {
        renderSummary();
      }

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    function nextStep() {
      blurActiveElement();

      if (currentStep === 3) {
        const foodFile = document.getElementById('foodImage').files[0];
        const chartFile = document.getElementById('chartImage').files[0];

        if (!foodFile || !chartFile) {
          alert('請先上傳食物照片與血糖波動圖片');
          return;
        }
      }

      if (currentStep < 4) {
        showStep(currentStep + 1);
      }
    }

    function prevStep() {
      blurActiveElement();

      if (currentStep === 4) {
        clearGeneratedResult();
      }

      if (currentStep > 1) {
        showStep(currentStep - 1);
      }
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getMealOrderText() {
      const selected = document.querySelector('input[name="mealOrder"]:checked');
      const otherText = document.getElementById('mealOrderOtherText').value.trim();

      if (!selected) {
        return '';
      }

      if (selected.value === '其他') {
        return otherText ? otherText : '其他';
      }

      if (selected.value === '菜 → 蛋白質 → 澱粉（建議順序）') {
        return '菜 → 蛋白質 → 澱粉';
      }

      return selected.value;
    }

    function getCheckedValues(name) {
      const values = [];
      document.querySelectorAll(`input[name="${name}"]:checked`).forEach(input => {
        values.push(input.value);
      });
      return values;
    }

    function getMealPairingText() {
      const selected = getCheckedValues('mealPairingOption');
      const otherCheck = document.getElementById('mealPairingOtherCheck');
      const otherText = document.getElementById('mealPairingOtherText').value.trim();

      if (otherText) {
        selected.push(otherText);
      } else if (otherCheck.checked) {
        selected.push('其他');
      }

      return selected.join('、');
    }

    function getFeelingText() {
      const selected = getCheckedValues('feelingOption').map(value => value.replace(/^[^\u4E00-\u9FFFa-zA-Z0-9]+\s*/, ''));
      const otherText = document.getElementById('feelingOtherText').value.trim();

      if (otherText) {
        selected.push(otherText);
      }

      return selected.join('、');
    }

    function renderSummary() {
      const data = getFormData(false);

      document.getElementById('summaryBox').innerHTML = `
        <strong>日期：</strong>${escapeHtml(data.date || '未填')}<br>
        <strong>食物：</strong>${escapeHtml(data.food || '未填')}<br>
        <strong>開始吃（第一口）：</strong>${escapeHtml(data.mealTime || '未填')}<br>
        <strong>進食順序：</strong>${escapeHtml(data.mealOrder || '未填')}<br>
        <strong>本餐搭配：</strong>${escapeHtml(data.mealPairing || '未填')}<br>
        <strong>餐後感受：</strong>${escapeHtml(data.feeling || '未填')}<br>
        <strong>最高峰：</strong>${escapeHtml(data.peakSugar || '未填')} mg/dL<br>
        <strong>飯後 3 小時：</strong>${escapeHtml(data.afterSugar || '未填')} mg/dL
      `;
    }

    function setStatus(message, isVisible = true) {
      const status = document.getElementById('status');
      status.innerText = message;
      status.style.display = isVisible ? 'block' : 'none';
    }

    function setGenerating(isGenerating) {
      const button = document.getElementById('generateButton');

      if (isGenerating) {
        button.disabled = true;
        button.innerText = '圖片產生中...';
      } else {
        button.disabled = false;
        button.innerText = '送出並產生圖片';
      }
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function previewImage(inputId, imgId) {
      const file = document.getElementById(inputId).files[0];
      const img = document.getElementById(imgId);

      if (!file) {
        img.style.display = 'none';
        img.src = '';
        return;
      }

      const dataUrl = await readFileAsDataURL(file);
      img.src = dataUrl;
      img.style.display = 'block';
    }

    function addMinutesToTime(timeText, minutesToAdd) {
      if (!timeText) return '';

      const [hourText, minuteText] = timeText.split(':');
      const hour = Number(hourText);
      const minute = Number(minuteText);

      if (Number.isNaN(hour) || Number.isNaN(minute)) {
        return '';
      }

      const totalMinutesInDay = 24 * 60;
      const originalTotalMinutes = hour * 60 + minute;
      const calculatedTotalMinutes = (originalTotalMinutes + minutesToAdd + totalMinutesInDay) % totalMinutesInDay;
      const calculatedHour = Math.floor(calculatedTotalMinutes / 60);
      const calculatedMinute = calculatedTotalMinutes % 60;

      return `${String(calculatedHour).padStart(2, '0')}:${String(calculatedMinute).padStart(2, '0')}`;
    }

    function getFormData(includeImages) {
      return {
        date: document.getElementById('date').value,
        food: document.getElementById('food').value,
        mealTime: document.getElementById('mealTime').value,
        mealOrder: getMealOrderText(),
        mealPairing: getMealPairingText(),
        feeling: getFeelingText(),
        mealSugar: document.getElementById('mealSugar').value,
        peakSugar: document.getElementById('peakSugar').value,
        peakTime: document.getElementById('peakTime').value,
        afterSugar: document.getElementById('afterSugar').value,
        afterTime: addMinutesToTime(document.getElementById('mealTime').value, 180),
        foodImg: includeImages ? document.getElementById('foodThumb').src : '',
        chartImg: includeImages ? document.getElementById('chartThumb').src : ''
      };
    }

    function buildExportHtml(data) {
      return `
        <div id="exportCard" class="export-card">
          <div class="export-left">
            <div class="export-title">🌿 CGM 測試紀錄</div>
            <div class="export-info">📅 日期：${escapeHtml(data.date || '未填')}
🍽️ 食物：${escapeHtml(data.food || '未填')}
🕒 開始吃：${escapeHtml(data.mealTime || '未填')}
🥗 進食順序：${escapeHtml(data.mealOrder || '未填')}
💊 本餐搭配：${escapeHtml(data.mealPairing || '未填')}
😊 餐後感受：${escapeHtml(data.feeling || '未填')}</div>

            <div class="export-record">
              🍴 進食當下 (${escapeHtml(data.mealTime || '未填')})：${escapeHtml(data.mealSugar || '未填')} mg/dL<br>
              📈 最高峰 (${escapeHtml(data.peakTime || '未填')})：${escapeHtml(data.peakSugar || '未填')} mg/dL<br>
              🕒 飯後 3 小時 (${escapeHtml(data.afterTime || '未填')})：${escapeHtml(data.afterSugar || '未填')} mg/dL
            </div>

            <img class="export-food-img" src="${data.foodImg}">
          </div>

          <div class="export-right">
            <img class="export-chart-img" src="${data.chartImg}">
          </div>
        </div>
      `;
    }

    async function waitForImagesLoaded(container) {
      const images = Array.from(container.querySelectorAll('img'));

      await Promise.all(images.map(img => {
        if (img.complete && img.naturalWidth > 0) {
          return Promise.resolve();
        }

        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));
    }

    async function generateAndExportImage() {
      try {
        blurActiveElement();

        const foodFile = document.getElementById('foodImage').files[0];
        const chartFile = document.getElementById('chartImage').files[0];

        if (!foodFile || !chartFile) {
          alert('請上傳食物照片與血糖波動圖片');
          showStep(3);
          return;
        }

        setGenerating(true);
        setStatus('圖片產生中，請稍候...手機圖片較大時可能需要幾秒。');
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('downloadLink').style.display = 'none';

        const data = getFormData(true);
        const exportSourceArea = document.getElementById('exportSourceArea');
        exportSourceArea.innerHTML = buildExportHtml(data);

        const exportCard = document.getElementById('exportCard');
        await waitForImagesLoaded(exportCard);

        const canvas = await html2canvas(exportCard, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          width: exportCard.scrollWidth,
          height: exportCard.scrollHeight,
          windowWidth: exportCard.scrollWidth,
          windowHeight: exportCard.scrollHeight
        });

        const imageData = canvas.toDataURL('image/png');
        const finalImage = document.getElementById('finalImage');
        const downloadLink = document.getElementById('downloadLink');

        finalImage.src = imageData;
        downloadLink.href = imageData;

        const now = new Date();
        const fileName = `血糖紀錄_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}.png`;

        latestFileName = fileName;
        downloadLink.download = fileName;

        latestImageBlob = await new Promise(resolve => {
          canvas.toBlob(blob => resolve(blob), 'image/png');
        });

        document.getElementById('resultArea').style.display = 'block';
        setStatus('', false);

        document.getElementById('resultArea').scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      } catch (error) {
        console.error(error);
        alert('產生圖片時發生錯誤，請確認圖片是否過大，或重新整理後再試一次。');
        setStatus('產生圖片失敗，請重新嘗試。');
      } finally {
        setGenerating(false);
      }
    }

    async function shareImage() {
      if (!latestImageBlob) {
        alert('請先產生圖片');
        return;
      }

      const file = new File([latestImageBlob], latestFileName, {
        type: 'image/png'
      });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: '血糖紀錄',
            text: '我的血糖紀錄圖片'
          });
        } catch (error) {
          console.log('使用者取消分享或分享失敗', error);
        }
      } else {
        document.getElementById('downloadLink').style.display = 'block';
        alert('這個瀏覽器不支援直接分享圖片，已顯示「備用下載圖片」。');
      }
    }

    function resetAll() {
      blurActiveElement();

      document.querySelectorAll('input').forEach(input => {
        if (input.type === 'checkbox' || input.type === 'radio') {
          input.checked = false;
        } else {
          input.value = '';
        }
      });

      document.querySelectorAll('.other-wrapper').forEach(wrapper => {
        wrapper.classList.remove('show');
      });

      document.getElementById('foodThumb').src = '';
      document.getElementById('foodThumb').style.display = 'none';
      document.getElementById('chartThumb').src = '';
      document.getElementById('chartThumb').style.display = 'none';

      clearGeneratedResult();
      showStep(1);
    }
  </script>
</body>
</html>
